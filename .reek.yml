---
exclude_paths:
  - test
  - bin

detectors:
  IrresponsibleModule:
    enabled: false
  UtilityFunction:
    enabled: false
  Attribute:
    enabled: false
  ClassVariable:
    enabled: false
  BooleanParameter:
    enabled: false
  ControlParameter:
    enabled: false
  FeatureEnvy:
    enabled: false
  UncommunicativeVariableName:
    enabled: false
  InstanceVariableAssumption:
    enabled: false
  NilCheck:
    enabled: false
  RepeatedConditional:
    enabled: false
  TooManyInstanceVariables:
    max_instance_variables: 15
  TooManyConstants:
    max_constants: 6
  TooManyMethods:
    max_methods: 35
  TooManyStatements:
    max_statements: 75
  LongParameterList:
    max_params: 5
  DuplicateMethodCall:
    max_calls: 5
  DataClump:
    exclude:
      - WvRunner::ClaudeCodeBase
  NestedIterators:
    max_allowed_nesting: 2
  UnusedParameters:
    enabled: false
